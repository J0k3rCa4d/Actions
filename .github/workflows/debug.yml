name: Debug tests

on:
  push:
    branches:
      - debug

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Setep 1 - Print debug setting
        run: |
          echo Is runner debug on: $ACTIONS_RUNNER_DEBUG
          echo Is step debug on: $ACTIONS_STEP_DEBUG
        env:
          ACTIONS_RUNNER_DEBUG: ${{ secrets.ACTIONS_RUNNER_DEBUG }}
          ACTIONS_STEP_DEBUG: ${{ secrets.ACTIONS_RUNNER_DEBUG }}

      - name: Step 2 - Save runer logs to artifact
        uses: actions/upload-artifact@v4
        with:
          name: runner logs
          path: ./runner-diagnostic-logs
          
  example_matrix:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        node: [14, 16]
        include:
          - os: windows-latest
            node: 16
            npm: 6
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - if: ${{ matrix.npm }}
        run: npm install -g npm@${{ matrix.npm }}
      - run: npm --version
